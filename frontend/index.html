<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🚀 TaskFlow</h1>

        <div class="counter-box">

            Total Tasks:
            <span id="taskCounter">0</span>

        </div>

        <form id="taskForm">

            <input 
                type="text" 
                id="title" 
                placeholder="Task Title"
                required
            >

            <input 
                type="text" 
                id="description" 
                placeholder="Description"
            >

            <select id="status">

                <option value="pending">
                    Pending
                </option>

                <option value="completed">
                    Completed
                </option>

            </select>

            <select id="priority">

                <option value="low">
                    Low
                </option>

                <option value="medium">
                    Medium
                </option>

                <option value="high">
                    High
                </option>

            </select>

            <input type="date" id="dueDate">

            <button type="submit">
                ➕ Add Task
            </button>

        </form>

        <input 
            type="text" 
            id="searchInput" 
            placeholder="🔍 Search tasks..."
        >

        <div id="taskList"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
